<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Quicksand",-apple-system,sans-serif;background:#F6F6FA;padding:28px;color:#141A33}h1{font-size:15px;letter-spacing:.14em;color:#555C7A;margin-bottom:18px}.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}</style><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"></head><body>
<h1>BUTTONS — CONTEXT DECIDES THE VARIANT</h1>
<div style="background:linear-gradient(160deg,#1A237E,#4A148C);border-radius:18px;padding:20px">
  <div style="font-size:11px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.8);margin-bottom:10px">ON THE STAGE</div>
  <div class="row">
    <button style="font-family:inherit;font-size:16px;font-weight:700;color:#1A237E;background:#fff;border:none;border-radius:18px;padding:15px 28px;box-shadow:0 6px 16px rgba(0,0,0,.28)">White pill · primary</button>
    <button style="font-family:inherit;font-size:16px;font-weight:700;color:rgba(255,255,255,.5);background:rgba(255,255,255,.18);border:none;border-radius:18px;padding:15px 28px">Disabled</button>
    <button style="font-family:inherit;font-size:14px;font-weight:700;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:12px 20px">Glass · secondary</button>
  </div>
</div>
<div style="background:#fff;border-radius:18px;padding:20px;margin-top:14px;box-shadow:0 4px 18px rgba(20,26,77,.07)">
  <div style="font-size:11px;font-weight:700;letter-spacing:.12em;color:#555C7A;margin-bottom:10px">ON PAPER</div>
  <div class="row">
    <button style="font-family:inherit;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(90deg,#1A237E,#4A148C);border:none;border-radius:14px;padding:13px 24px">Brand gradient · primary</button>
    <button style="font-family:inherit;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(90deg,#A9762A,#C79A3E);border:none;border-radius:14px;padding:13px 24px">Business gold</button>
    <button style="font-family:inherit;font-size:13px;font-weight:700;color:#1A237E;background:rgba(26,35,126,.10);border:none;border-radius:99px;padding:10px 16px">Chip action</button>
  </div>
  <p style="font-size:12.5px;color:#8A8FA8;margin-top:12px">Rule: gradient buttons never sit on the gradient stage — the stage's primary is always the white pill.</p>
</div>
</body></html>
